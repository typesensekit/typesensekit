name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: node scripts/skip-published-packages.mjs
      - run: pnpm changeset publish
      - name: Create GitHub releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          while IFS= read -r tag; do
            case "$tag" in
              "@typesensekit/cli@"*) changelog="packages/cli/CHANGELOG.md" ;;
              "@typesensekit/mcp@"*) changelog="packages/mcp/CHANGELOG.md" ;;
              *) continue ;;
            esac

            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              continue
            fi

            version="${tag##*@}"
            notes="$(awk -v heading="## $version" '
              $0 == heading { capture = 1; next }
              capture && /^## / { exit }
              capture { print }
            ' "$changelog")"

            if [[ -z "$notes" ]]; then
              echo "No changelog entry found for $tag" >&2
              exit 1
            fi

            git push origin "refs/tags/$tag"
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$tag" \
              --notes "$notes"
          done < <(git tag --points-at HEAD)
